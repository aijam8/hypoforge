# HypoForge modular model router — one pluggable slot per subtask.
# Swap any model here without touching code. All via OpenRouter (OpenAI-compatible);
# set DEEPSEEK_API_KEY to route the deepseek/* ids directly instead.
# Different roles deliberately use different models so the critique panel argues
# with genuinely diverse voices.

defaults:
  provider: openrouter
  model: deepseek/deepseek-chat
  temperature: 0.3

fallback_chain: [openrouter, deepseek, mock]

roles:
  # --- intake / structuring ---
  intake:        { model: deepseek/deepseek-chat,            temperature: 0.2 }

  # --- extraction / summarization (high volume, cheap, crisp) ---
  extract:       { model: meta-llama/llama-3.3-70b-instruct, temperature: 0.0 }
  summarize:     { model: deepseek/deepseek-chat,            temperature: 0.2 }
  retrieval:     { model: deepseek/deepseek-chat,            temperature: 0.0 }

  # --- analysis ---
  literature:    { model: deepseek/deepseek-chat,            temperature: 0.3 }
  usercontext:   { model: deepseek/deepseek-chat,            temperature: 0.2 }

  # --- generation (creative) ---
  hypothesis:    { model: qwen/qwen-2.5-72b-instruct,        temperature: 0.7 }

  # --- ranking (crisp, deterministic) ---
  ranking:       { model: deepseek/deepseek-chat,            temperature: 0.0 }

  # --- critique panel (diverse voices) ---
  critic_literature:   { model: deepseek/deepseek-chat,            temperature: 0.3 }
  critic_feasibility:  { model: meta-llama/llama-3.3-70b-instruct, temperature: 0.2 }
  critic_novelty:      { model: qwen/qwen-2.5-72b-instruct,        temperature: 0.4 }
  experimental_design: { model: deepseek/deepseek-chat,            temperature: 0.4 }
  uncertainty_analyst: { model: deepseek/deepseek-chat,            temperature: 0.2 }

  # --- final synthesis ---
  synthesis:     { model: deepseek/deepseek-chat,            temperature: 0.3 }
